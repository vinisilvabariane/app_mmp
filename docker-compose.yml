services:
  web:
    container_name: app_mmp
    build: .
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      mysql-init:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mysql:
    image: mysql:8.0
    container_name: db_mmp
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME:-db_mmp}
      MYSQL_USER: ${DB_USER:-app_mmp}
      MYSQL_PASSWORD: ${DB_PASS:-app_mmp}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mysql-init:
    image: mysql:8.0
    container_name: db_mmp_init
    restart: "no"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./docker/mysql/init:/init:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        mysql -hmysql -uroot -p"$${MYSQL_ROOT_PASSWORD}" -e "CREATE DATABASE IF NOT EXISTS \`$${DB_NAME}\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
        for file in /init/*.sql; do
          echo "Applying $$file"
          mysql -hmysql -uroot -p"$${MYSQL_ROOT_PASSWORD}" "$${DB_NAME}" < "$$file"
        done

volumes:
  mysql_data:

